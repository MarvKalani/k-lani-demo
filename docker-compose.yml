name: k-lani-demo

x-k-lani-common: &k-lani-common
  build:
    context: .
  image: k-lani-demo:preview
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=64M,noexec,nosuid,nodev
    - /run:size=16M,noexec,nosuid,nodev

services:
  landing:
    <<: *k-lani-common
    environment:
      K_LANI_DEMO_MODE: landing
      K_LANI_REPORT_DIR: /reports
      K_LANI_LANDING_HTTP_ADDR: 0.0.0.0:8082
      K_LANI_PREVIEW_EXPIRES_ON: ${K_LANI_PREVIEW_EXPIRES_ON:-2026-08-29}
      K_LANI_PREVIEW_MAX_TABLES: ${K_LANI_PREVIEW_MAX_TABLES:-10}
    volumes:
      - landing-reports:/reports
    ports:
      - "8082:8082"
    mem_limit: 128m
    cpus: 0.25

  horde:
    <<: *k-lani-common
    environment:
      K_LANI_DEMO_MODE: horde
      K_LANI_DATA_DIR: /data
      K_LANI_REPORT_DIR: /reports
      K_LANI_ADDR: 127.0.0.1:7700
      K_LANI_USERS: ${K_LANI_USERS:-100000}
      K_LANI_WORKERS: ${K_LANI_WORKERS:-128}
      K_LANI_TABLE: ${K_LANI_TABLE:-concert_seats}
      K_LANI_PREVIEW_EXPIRES_ON: ${K_LANI_PREVIEW_EXPIRES_ON:-2026-08-29}
      K_LANI_PREVIEW_MAX_TABLES: ${K_LANI_PREVIEW_MAX_TABLES:-10}
      K_LANI_HORDE_HTTP_ADDR: 0.0.0.0:8081
    volumes:
      - horde-data:/data
      - horde-reports:/reports
    ports:
      - "8081:8081"
    mem_limit: ${K_LANI_HORDE_MEM_LIMIT:-4g}
    cpus: ${K_LANI_HORDE_CPUS:-2.0}
    ulimits:
      nofile:
        soft: 8192
        hard: 16384
      nproc: 1024

  hft:
    <<: *k-lani-common
    tmpfs:
      - /tmp:size=64M,noexec,nosuid,nodev
      - /run:size=16M,noexec,nosuid,nodev
      - /data/hft:size=10m,noexec,nosuid,nodev
    environment:
      K_LANI_DEMO_MODE: hft
      K_LANI_HFT_DATA_DIR: /data/hft
      K_LANI_REPORT_DIR: /reports
      K_LANI_HFT_HTTP_ADDR: 0.0.0.0:8080
      K_LANI_HFT_QUIC_ADDR: 0.0.0.0:7701
      K_LANI_HFT_MAX_DATA_BYTES: ${K_LANI_HFT_MAX_DATA_BYTES:-10485760}
      K_LANI_TICK_INTERVAL_MS: ${K_LANI_TICK_INTERVAL_MS:-1}
      K_LANI_PREVIEW_EXPIRES_ON: ${K_LANI_PREVIEW_EXPIRES_ON:-2026-08-29}
      K_LANI_PREVIEW_MAX_TABLES: ${K_LANI_PREVIEW_MAX_TABLES:-10}
    volumes:
      - hft-reports:/reports
    ports:
      - "8080:8080"
      - "7701:7701/udp"
    mem_limit: ${K_LANI_HFT_MEM_LIMIT:-1g}
    cpus: ${K_LANI_HFT_CPUS:-1.5}
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
      nproc: 512

volumes:
  landing-reports:
  horde-data:
  horde-reports:
  hft-reports: